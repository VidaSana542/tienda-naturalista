    .card { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 500px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #10b981; }
    p { color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
    .btn { display: inline-block; padding: 14px 32px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-primary { background: #10b981; color: #fff; }
    .btn-primary:hover { background: #059669; transform: translateY(-1px); }
    .btn-danger { background: #ef4444; color: #fff; margin-left: 10px; }
    .btn-danger:hover { background: #dc2626; }
    .result { margin-top: 20px; padding: 16px; border-radius: 10px; text-align: left; font-size: 0.85rem; max-height: 300px; overflow-y: auto; display: none; }
    .result.success { display: block; background: #064e3b; border: 1px solid #10b981; }
    .result.error { display: block; background: #7f1d1d; border: 1px solid #ef4444; }
    .count { font-size: 2rem; font-weight: 700; color: #10b981; margin: 12px 0; }
    .info { background: #334155; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>

    function importar() {
      const r = document.getElementById('result');
      try {
        let cats = JSON.parse(localStorage.getItem('posCategories') || '[]');
        let added = 0;
        for (const c of CATEGORIAS) {
          if (!cats.find(x => x.key === c.key)) { cats.push(c); added++; }
        }
        localStorage.setItem('posCategories', JSON.stringify(cats));

        let prods = JSON.parse(localStorage.getItem('posProducts') || '[]');
        let nextId = prods.reduce((m, p) => Math.max(m, parseInt(String(p.id).replace('p',''))), 0) + 1;
        let imported = 0;
        for (const p of PRODUCTOS) {
          p.id = 'p' + (nextId++);
          prods.push(p);
          imported++;
        }
        localStorage.setItem('posProducts', JSON.stringify(prods));

        r.className = 'result success';
        r.innerHTML = '<b>✅ Importado!</b><br>' + imported + ' productos nuevos<br>' + added + ' categorías nuevas<br><br>Total productos: ' + prods.length;
      } catch(e) {
        r.className = 'result error';
        r.innerHTML = '<b>Error:</b> ' + e.message + '<br>Asegúrate de abrir el POS primero en esta pestaña.';
      }
    }

    function limpiar() {
      if (!confirm('¿Eliminar TODOS los productos y categorías del POS?')) return;
      localStorage.removeItem('posProducts');
      localStorage.removeItem('posCategories');
      const r = document.getElementById('result');
      r.className = 'result success';
      r.innerHTML = '<b>🧹 Limpiado</b><br>Todos los productos y categorías fueron eliminados.';
    }
