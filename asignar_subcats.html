// --- Helpers ---
function normalizeName(name) {
    return name.normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function cleanName(name) {
    let n = name
        .replace(/[_–-][A-Za-zÁÉÍÓÚáéíóúÑñ]+(?:\s[A-Za-zÁÉÍÓÚáéíóúÑñ]+)*(?=\s*$)/, '')
        .trim();
    if (n === '') return name;
    return n;
}

// Build normalized lookup from PRODUCT_SUBCAT_LABEL_MAP
function buildNormLabelMap() {
    const m = {};
    for (const [name, label] of Object.entries(PRODUCT_SUBCAT_LABEL_MAP)) {
        m[normalizeName(name).toLowerCase()] = label;
    }
    return m;
}
const NORM_LABEL_MAP = buildNormLabelMap();

// Find label by product name (normalized, cleaned, partial)
function findLabel(name) {
    const norm = normalizeName(name).toLowerCase();
    if (NORM_LABEL_MAP[norm]) return NORM_LABEL_MAP[norm];

    const cleaned = normalizeName(cleanName(name)).toLowerCase();
    if (cleaned !== norm && NORM_LABEL_MAP[cleaned]) return NORM_LABEL_MAP[cleaned];

    const keys = Object.keys(NORM_LABEL_MAP).sort((a, b) => b.length - a.length);
    for (const key of keys) {
        if (key.length >= 4 && cleaned.includes(key)) return NORM_LABEL_MAP[key];
    }
    return '';
}

// Find subcategory key by label + category (uses real DB categories)
function findSubcatKey(label, catKey, categories) {
    if (!label || !categories) return '';
    const normLabel = normalizeName(label).toLowerCase();
    // Prefer subcat whose parent matches the product's category
    let match = categories.find(c => c.parent_key === catKey && normalizeName(c.label).toLowerCase() === normLabel);
    if (match) return match.key;
    // Fallback: any subcat with matching label
    match = categories.find(c => c.parent_key && normalizeName(c.label).toLowerCase() === normLabel);
    if (match) return match.key;
    // Fallback: partial
    match = categories.find(c => c.parent_key && normalizeName(c.label).toLowerCase().includes(normLabel));
    if (match) return match.key;
    return '';
}

async function run() {
    document.getElementById('result').innerHTML = '<div class="log log-info">Cargando productos y categorias...</div>';
    document.getElementById('btnRun').disabled = true;
    document.getElementById('btnBatch').style.display = 'none';
    document.getElementById('batchBar').style.display = 'none';
    try {
        await API.check();
        if (!API.isAvailable) { log('ERROR: API no disponible', 'err'); return; }

        const categories = await API.getCategories();
        const { data: products, error } = await _sb.from('products').select('*').eq('active', true);
        if (error) throw error;

        const sinSub = (products || []).filter(p => !p.subcategory || p.subcategory.trim() === '');
        if (sinSub.length === 0) { log('Todos los productos ya tienen subcategoria!', 'ok'); return; }

        log(`Encontrados ${sinSub.length} productos sin subcategoria.`, 'info');
        log('---', 'info');

        let asignados = 0, errors = 0, noMatch = [];

        for (const p of sinSub) {
            const label = findLabel(p.name);
            let suggested = label ? findSubcatKey(label, p.category, categories) : '';

            if (!suggested) {
                // Keyword fallback
                const catKeywords = SUBCAT_KEYWORDS[p.category];
                if (catKeywords) {
                    const lower = p.name.toLowerCase();
                    let bestLabel = '', bestScore = 0;
                    for (const [subLabel, keywords] of Object.entries(catKeywords)) {
                        for (const kw of keywords) {
                            if (lower.includes(kw.toLowerCase()) && kw.length > bestScore) {
                                bestScore = kw.length;
                                bestLabel = subLabel;
                            }
                        }
                    }
                    if (bestLabel) suggested = findSubcatKey(bestLabel, p.category, categories);
                }
            }

            if (!suggested) {
                noMatch.push(p);
                log(`  ? #${p.id} "${p.name}" (${p.category}) — sin coincidencia`, 'warn');
                continue;
            }

            const subCat = categories.find(c => c.key === suggested);
            try {
                await API.saveProduct({ ...p, subcategory: suggested });
                log(`  ✓ #${p.id} "${p.name}" → ${subCat ? subCat.label : suggested}`, 'ok');
                asignados++;
            } catch (e) {
                log(`  ✗ #${p.id} "${p.name}": ${e.message}`, 'err');
                errors++;
            }
        }

        log('---', 'info');
        log(`Asignados: ${asignados}, Errores: ${errors}, Sin coincidencia: ${noMatch.length}`, errors === 0 ? 'ok' : 'warn');

        if (noMatch.length > 0) {
            window._noMatch = noMatch;
            window._categories = categories;
            document.getElementById('btnBatch').style.display = 'inline-block';
            log(`\nQuedan ${noMatch.length} productos sin coincidencia. Usa "Asignar Restantes Manualmente" para asignarlos en lote.`, 'warn');
        }
    } catch (e) {
        log('ERROR: ' + e.message, 'err');
        console.error(e);
    } finally {
        document.getElementById('btnRun').disabled = false;
    }
}

function showBatchBar() {
    const bar = document.getElementById('batchBar');
    const nm = window._noMatch || [];
    if (nm.length === 0) return;
    const cats = [...new Set(nm.map(p => p.category))];
    let html = `<strong>${nm.length} productos sin asignar.</strong><br><br>`;
    cats.forEach(catKey => {
        const catLabel = (window._categories || []).find(c => c.key === catKey)?.label || catKey;
        const subs = (window._categories || []).filter(c => c.parent_key === catKey);
        html += `<div style="margin:8px 0;">
            <label><strong>${catLabel}</strong> (${nm.filter(p => p.category === catKey).length} prod):
            <select id="batch_${catKey}">
                <option value="">(saltar)</option>
                ${subs.map(s => `<option value="${s.key}">${s.label}</option>`).join('')}
            </select>
            <button onclick="assignBatch('${catKey}')" style="padding:4px 12px;font-size:12px;">Asignar</button>
        </div>`;
    });
    bar.innerHTML = html;
    bar.style.display = 'block';
}

async function assignBatch(catKey) {
    const sel = document.getElementById('batch_' + catKey);
    const subKey = sel.value;
    if (!subKey) return;
    const nm = window._noMatch || [];
    const toAssign = nm.filter(p => p.category === catKey);
    if (toAssign.length === 0) return;

    document.getElementById('btnBatch').disabled = true;
    let ok = 0, err = 0;
    for (const p of toAssign) {
        try {
            await API.saveProduct({ ...p, subcategory: subKey });
            log(`  ✓ #${p.id} "${p.name}" → ${(window._categories||[]).find(c=>c.key===subKey)?.label||subKey}`, 'ok');
            ok++;
        } catch (e) {
            log(`  ✗ #${p.id} "${p.name}": ${e.message}`, 'err');
            err++;
        }
    }
    log(`\nLote ${catKey}: ${ok} OK, ${err} errores`, err === 0 ? 'ok' : 'warn');
    window._noMatch = nm.filter(p => p.category !== catKey);
    document.getElementById('btnBatch').disabled = false;
    if (window._noMatch.length === 0) {
        document.getElementById('btnBatch').style.display = 'none';
        document.getElementById('batchBar').style.display = 'none';
    } else {
        showBatchBar();
    }
}

function log(msg, type) {
    const el = document.getElementById('result');
    el.innerHTML += `<div class="log log-${type}">${msg}</div>`;
}
