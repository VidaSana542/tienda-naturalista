<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Productos</title>
<script src="auth.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../js/api.js"></script>
<style>
body { font-family: system-ui, sans-serif; padding: 40px; max-width: 600px; margin: auto; background: #f5f5f5; }
.card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
h1 { color: #dc3545; margin-bottom: 16px; }
button { padding: 12px 32px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; margin: 12px; }
.btn-danger { background: #dc3545; color: #fff; }
.btn-danger:hover { background: #c82333; }
.btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
#result { margin-top: 20px; font-family: monospace; font-size: 14px; line-height: 1.8; }
.log-ok { color: #155724; }
.log-err { color: #721c24; }
.log-info { color: #004085; }
</style>
</head>
<body>
<div class="card">
    <h1>Recuperar Productos</h1>
    <p style="margin:16px 0;color:#666;">Reactivar todos los productos que fueron desactivados por error.</p>
    <button class="btn-danger" id="btnRecover" onclick="recover()">Reactivar Todos los Productos</button>
    <div id="result"></div>
</div>
<script>
async function recover() {
    const btn = document.getElementById('btnRecover');
    btn.disabled = true;
    btn.textContent = 'Reactivando...';
    document.getElementById('result').innerHTML = '<div class="log-info">Conectando...</div>';

    try {
        await API.check();
        if (!API.isAvailable) { document.getElementById('result').innerHTML = '<div class="log-err">API no disponible</div>'; return; }

        const { data: inactive, error: qErr } = await _sb.from('products').select('id, name').eq('active', false);
        if (qErr) throw qErr;

        if (!inactive || inactive.length === 0) {
            document.getElementById('result').innerHTML = '<div class="log-ok">No hay productos desactivados.</div>';
            return;
        }

        const { error: upErr } = await _sb.from('products').update({ active: true }).eq('active', false);
        if (upErr) throw upErr;

        document.getElementById('result').innerHTML = `<div class="log-ok">✓ Reactivados ${inactive.length} productos.</div>`;
    } catch (e) {
        document.getElementById('result').innerHTML = `<div class="log-err">ERROR: ${e.message}</div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Reactivar Todos los Productos';
    }
}
</script>
</body>
</html>
